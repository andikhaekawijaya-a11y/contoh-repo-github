<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Daily Notes</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        text-align: center;
        margin: 20px;
    }

    .container {
        max-width: 600px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    h1 {
        color: #333;
    }

    textarea {
        width: 100%;
        height: 120px;
        padding: 10px;
        margin-bottom: 10px;
    }

    button {
        background-color: #28a745;
        color: white;
        border: none;
        padding: 10px 20px;
        cursor: pointer;
        border-radius: 5px;
    }

    button:hover {
        background-color: #218838;
    }

    .note {
        background: #fff8dc;
        padding: 10px;
        margin-top: 10px;
        border-left: 5px solid orange;
        text-align: left;
    }
</style>
</head>

<body>

<div class="container">
    <h1>📝 My Daily Notes</h1>

    <textarea id="noteInput" placeholder="Tulis catatan harian Anda..."></textarea>
    <br>
    <button onclick="simpanCatatan()">Simpan Catatan</button>

    <h2>Daftar Catatan</h2>
    <div id="listCatatan"></div>
</div>

<script>
function simpanCatatan() {
    let isiCatatan = document.getElementById("noteInput").value;

    if (isiCatatan.trim() === "") {
        alert("Catatan tidak boleh kosong!");
        return;
    }

    let divCatatan = document.createElement("div");
    divCatatan.className = "note";

    let tanggal = new Date().toLocaleString();

    divCatatan.innerHTML =
        "<strong>" + tanggal + "</strong><br>" +
        isiCatatan;

    document.getElementById("listCatatan").prepend(divCatatan);

    document.getElementById("noteInput").value = "";
}
</script>

</body>
</html>
